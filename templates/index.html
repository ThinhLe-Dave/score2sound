<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score2Sound - OMR Processor</title>
    <!-- Sheet Music Rendering Library -->
    <script src="https://unpkg.com/opensheetmusicdisplay@latest/build/opensheetmusicdisplay.min.js"></script>
    <!-- MIDI Player Library (Tone.js + Magenta + HTML MIDI Player) -->
    <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/@magenta/music@1.23.1/es6/core.js,npm/html-midi-player@1.5.0"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>🎵 Score2Sound</h1>
        <p class="subtitle">Convert sheet music images to digital audio and MusicXML</p>
        
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="drop-zone" id="dropZone">
                <p>📸 <strong>Click to upload</strong> or drag and drop</p>
                <p style="font-size: 0.85rem; margin-top: 5px;">PNG, JPG or JPEG</p>
                <input type="file" id="fileInput" name="file" accept="image/*" required>
            </div>

            <div id="preview-container">
                <img id="image-preview" src="" alt="Preview">
                <p id="file-name" style="font-size: 0.9rem; margin-top: 5px; color: var(--text-muted)"></p>
            </div>

            <button type="submit" id="submitBtn">Process Score</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p id="loadingText">Initializing OMR engine...</p>
        </div>
        
        <div class="result" id="result">
            <h3><span>✅</span> Processing Complete!</h3>
            <p>Your sheet music is ready for download.</p>
            <div class="buttons">
                <button class="btn" id="downloadMusicXmlBtn">📥 Download MusicXML</button>
                <button class="btn" id="downloadMidiBtn">📥 Download MIDI</button>
            </div>
            <div class="tempo-control">
                <label for="tempoSlider">Tempo</label>
                <input type="range" id="tempoSlider" min="30" max="240" value="100">
                <span id="tempoValue">100 BPM</span>
            </div>
            <midi-player id="midiPlayer" sound-font="https://storage.googleapis.com/magentadata/js/soundfonts/sgm_plus" visualizer="#midiVisualizer"></midi-player>
            <midi-visualizer id="midiVisualizer" type="piano-roll"></midi-visualizer>
            <div id="osmd-container"></div>
        </div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
